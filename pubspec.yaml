name: capital_car_app
description: "سيارة العاصمة - تطبيق إدارة حسابات سيارة النقل"
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.0
  signalr_netcore: ^1.3.0
  connectivity_plus: ^6.0.0

  # Auth & Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.0

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.0

  # Forms & Validation
  flutter_form_builder: ^9.2.0
  form_builder_validators: ^10.0.0

  # Utilities
  intl: ^0.19.0
  timeago: ^3.6.0
  share_plus: ^9.0.0
  url_launcher: ^6.2.0
  package_info_plus: ^8.0.0
  
  # Additional utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  mockito: ^5.4.0
  network_image_mock: ^2.1.0
  freezed: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/

  # Fonts
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"